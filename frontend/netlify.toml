[build]
  base    = "frontend"
  command = "npm run build"
  publish = "frontend/dist"

[build.environment]
  NODE_VERSION = "20"

# Redirect root to default locale
[[redirects]]
  from   = "/"
  to     = "/es/"
  status = 301

# SPA fallback (should not be needed for static, but kept as safety net)
[[redirects]]
  from   = "/*"
  to     = "/es/"
  status = 404
  force  = false

# Security headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options        = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy        = "strict-origin-when-cross-origin"
    Permissions-Policy     = "camera=(), microphone=(), geolocation=()"

# Cache static assets
[[headers]]
  for = "/_astro/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
